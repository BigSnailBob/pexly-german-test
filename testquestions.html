<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>German Language Test</title>
  <link rel="stylesheet" href="testquestions.css">
</head>
<body>
  <div class="timer js-timer">25:00</div>

  <form action="" class="js-interview--form">
    <fieldset class="personal-information">
      <legend>Applicant Information</legend>

      <div class="question-container">
        <label for="fname" class="question-label">First Name</label>
        <input type="text" placeholder="First name" id="fname" class="question-input" required>
      </div>
      
      <div class="question-container">
        <label for="lname" class="question-label">Last Name</label>
        <input type="text" placeholder="First name" id="lname" class="question-input" required>
      </div>
      
      <div class="question-container">
        <label for="email" class="question-label">Email Address</label>
        <input type="email" id="email" placeholder="Email address" class="question-input" required>
      </div>
      
      <div class="question-container">
        <label for="phonenum" class="question-label">Phone Number</label>
        <input type="text" id="phonenum" placeholder="Phone Number" class="question-input" required>
      </div>
    </fieldset>

    <fieldset class="js-language-test language-test"></fieldset>

    <div class="form-message js-form-message" role="status" aria-live="polite"></div>

    <button type="submit" class="submit-button">Submit</button>

  </form>

  <script src="scripts/form.js" type="module"></script>
</body>
</html>
